---
# Задачи для установки и настройки Vector

- name: Include OS-specific variables
  include_vars: "{{ ansible_os_family }}.yml"
  ignore_errors: yes

- name: Install dependencies
  apt:
    name: "{{ vector_dependencies }}"
    state: present
    update_cache: yes
  become: yes

- name: Download Vector binary
  get_url:
    url: "{{ vector_download_url }}"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    validate_certs: yes
  become: yes
  register: download_result
  until: download_result is success
  retries: 3
  delay: 5

- name: Extract Vector binary
  unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    extra_opts: ['--strip-components=2']
    creates: "{{ vector_binary_path }}"
  become: yes

- name: Create Vector user
  user:
    name: "{{ vector_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
  become: yes

- name: Create Vector directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: '0755'
  loop:
    - "{{ vector_config_dir }}"
    - "{{ vector_data_dir }}"
    - "{{ vector_log_dir }}"
  become: yes

- name: Deploy Vector configuration
  template:
    src: "{{ vector_config_template }}"
    dest: "{{ vector_config_dir }}/vector.toml"
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: '0644'
  become: yes
  notify: restart vector

- name: Deploy Vector systemd service
  template:
    src: vector.service.j2
    dest: "{{ vector_systemd_path }}"
    mode: '0644'
  become: yes
  notify: restart vector

- name: Enable and start Vector service
  systemd:
    name: "{{ vector_service_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Verify Vector installation
  command: "{{ vector_binary_path }} --version"
  register: vector_version_check
  changed_when: false
  failed_when: false

- name: Display Vector version
  debug:
    msg: "Vector version: {{ vector_version_check.stdout }}"
  when: vector_version_check is success
